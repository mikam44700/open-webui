<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Logo LunarIA : croissant de lune sur dégradé indigo→violet.
       Rebranding couvert par la licence open-webui, exception (i) :
       déploiements de 50 utilisateurs ou moins sur 30 jours glissants. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <mask id="crescent">
      <circle cx="50" cy="54" r="30" fill="white"/>
      <circle cx="62.6" cy="41.4" r="27.6" fill="black"/>
    </mask>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <circle cx="50" cy="54" r="30" fill="#f5f5ff" mask="url(#crescent)"/>
  <circle cx="27" cy="25" r="3.5" fill="#f5f5ff" opacity="0.92"/>
</svg>
